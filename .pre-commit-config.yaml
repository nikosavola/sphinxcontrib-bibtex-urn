# Hook priorities for prek parallel execution:
# 10: Initial formatters and independent checkers (e.g., ruff check, codespell)
# 20: Dependent formatters and linters (e.g., ruff-format, stylelint)
# 30: Global end-of-file-fixer
# 40: Global trailing-whitespace cleanup
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        priority: 10
      - id: end-of-file-fixer
        priority: 30
      - id: trailing-whitespace
        priority: 40
      - id: detect-private-key
        priority: 10
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        priority: 10
        additional_dependencies:
          - tomli
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        priority: 10
        args: [--fix, --exit-non-zero-on-fix, --config=pyproject.toml]
      - id: ruff-format
        priority: 20
        args: [--config=pyproject.toml]
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        priority: 10
        args: [-conf, ".github/.yamlfmt.yaml"]
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        priority: 20
        args: [--strict, "-c=.github/.yamllint.yaml"]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint
        priority: 10
  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 0.52.0
    hooks:
      - id: pyrefly-check
        priority: 20
        name: Pyrefly
        pass_filenames: true
        args: ["--ignore", "missing-import"]
  - repo: https://github.com/LilSpazJoekp/docstrfmt
    rev: v2.0.2
    hooks:
      - id: docstrfmt
        priority: 20
        language_version: python3
        types: [rst]
  - repo: https://github.com/sphinx-contrib/sphinx-lint
    rev: v1.0.2
    hooks:
      - id: sphinx-lint
        priority: 20
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        priority: 20
        name: markdownlint
        args: [--config, .github/.markdownlint-cli2.yaml]
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        priority: 10
        args: [--wrap=120]
        additional_dependencies:
          - mdformat-gfm
          - mdformat-gfm-alerts
          - mdformat-frontmatter
          - mdformat-footnote
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v0.7.28
    hooks:
      - id: tombi-format
        priority: 10
      - id: tombi-lint
        priority: 20
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        priority: 20
        args: [--config=pyproject.toml]
        pass_filenames: true
        exclude: '^(tests/)'
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        priority: 10
  - repo: https://github.com/lovesegfault/beautysh
    rev: v6.4.3
    hooks:
      - id: beautysh
        priority: 10
  - repo: local
    hooks:
      - id: just-fmt
        priority: 10
        name: just-fmt
        entry: just --fmt --unstable --justfile
        pass_filenames: true
        files: ^justfile$
        language: system
