name: Release
on:
  push:
    branches:
      - main
jobs:
  check_and_tag:
    name: Check for version bump and create tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_version.outputs.tag }}
      new_tag_created: ${{ steps.check_tag.outputs.new_tag }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep -m 1 '^version =' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check if tag exists and create if not
        id: check_tag
        run: |
          TAG=${STEPS_GET_VERSION_OUTPUTS_TAG}
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG"; then
            echo "Tag $TAG already exists. No new release will be created."
            echo "new_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist. Creating and pushing tag."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release ${STEPS_GET_VERSION_OUTPUTS_VERSION}"
            git push origin "$TAG"
            echo "new_tag=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          STEPS_GET_VERSION_OUTPUTS_TAG: ${{ steps.get_version.outputs.tag }}
          STEPS_GET_VERSION_OUTPUTS_VERSION: ${{ steps.get_version.outputs.version }}
  build:
    name: Build package
    needs: check_and_tag
    if: needs.check_and_tag.outputs.new_tag_created == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
  github_release:
    name: Create GitHub Release
    needs: [check_and_tag, build]
    if: needs.check_and_tag.outputs.new_tag_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Create Release
        run: |
          # Get the latest draft release tag if it exists
          DRAFT_TAG=$(gh release list --limit 1 --json isDraft,tagName --jq '.[] | select(.isDraft==true) | .tagName' || echo "")

          if [ -n "$DRAFT_TAG" ]; then
            # Get the body of the draft release
            DRAFT_BODY=$(gh release view "$DRAFT_TAG" --json body --jq '.body' || echo "")
            # Create release with draft body
            gh release create "${NEEDS_CHECK_AND_TAG_OUTPUTS_TAG}" \
              --title "${NEEDS_CHECK_AND_TAG_OUTPUTS_TAG}" \
              --notes "$DRAFT_BODY"
          else
            # Create release with auto-generated notes
            gh release create "${NEEDS_CHECK_AND_TAG_OUTPUTS_TAG}" \
              --title "${NEEDS_CHECK_AND_TAG_OUTPUTS_TAG}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_CHECK_AND_TAG_OUTPUTS_TAG: ${{ needs.check_and_tag.outputs.tag }}
  pypi_publish:
    name: Publish to PyPI
    needs: [check_and_tag, build]
    if: needs.check_and_tag.outputs.new_tag_created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sphinxcontrib-bibtex-urn
    permissions:
      id-token: write # Required for OIDC trusted publishing
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
