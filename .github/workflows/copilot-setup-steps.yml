name: Copilot Setup Steps
permissions:
  contents: read
on:
  workflow_dispatch:
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install just
        uses: extractions/setup-just@v3
      - name: Install dependencies
        run: just install
